name: Запуск ритейл-агента

on:
  schedule:
    # Запуск каждые 1 час с 8 до 22 по московскому времени (UTC+3)
    - cron: '0 5-20 * * *'  # UTC 5-20 = MSK 8-23
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    steps:
      - name: Проверка кода
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
        
      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Установка зависимостей
        run: pip install -r requirements.txt
        
      - name: Восстановление истории
        uses: actions/cache@v4
        with:
          path: sent_news.json
          key: sent-news-${{ github.run_id }}
          restore-keys: |
            sent-news-
            
      - name: Запуск агента
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python agent.py
